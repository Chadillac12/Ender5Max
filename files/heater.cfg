[mcu expander]
serial: /dev/serial/by-id/usb-Klipper_stm32f042x6_120031001653304B4D323431-if00
restart_method: command
#========================================================
#=================== iHeaterS cfg (Beta 1) ==============
#========================================================

# Changes 2025-05-21_23-15-34:
# - Added section headers with descriptions of their purpose.
# - Code formatted for readability: added indentation, blank lines, aligned parameters.
# - Added English comments to every line of code, including G-code inside macros.
# - Code marked as Beta 1.

### Section 1: iHeaterS Pin Definitions
# Description: This section describes the pins used for connecting the heater, temperature sensors, and fans. The section is commented out because [duplicate_pin_override] is used from another config file (e.g., printer.cfg).
#===================== iHeaterS pins =====================
# Allow pin reuse for connection flexibility
[duplicate_pin_override]              # Defines the ability to reuse pins (commented out)
pins:                                 # List of pins for reuse (commented out)
    expander:PA5,                             # Pin PC0: used to control heater Heater_TT
    expander:PA6,
    expander:PA3                     # Pin PC5: used for temperature sensor (shared with chamber_temp)
#    PB1,                             # Pin PB1: used to control chamber_heater_fan
#    PC8                              # Pin PC8: used to control blower_fan
# Pins for heater, sensors and fans (PC5 is shared between two sensors)

### Section 2: iHeaterS Configuration
# Description: Hardware setup for controlling the chamber heater (Heater_TT), fans (chamber_heater_fan, blower_fan), and temperature sensor (Heater_TS). Includes PID parameters and heater verification.
#==================== iHeaterS CONFIG ====================
# Recommended PID calibration command for the chamber heater:
#🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥
#     PID_CALIBRATE HEATER=Heater_TT TARGET=45         # Command to calibrate PID at 45°C
#     PID parameters for 45°C:                         # PID parameters for 45°C:
#                            pid_Kp=65.373             # Proportional coefficient (Kp) for PID
#                            pid_Ki=0.214              # Integral coefficient (Ki) for PID
#                            pid_Kd=4993.676           # Derivative coefficient (Kd) for PID
#🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥🔥
# This is necessary for accurate and stable chamber heating.
# Without PID calibration the temperature may overshoot or stabilize too slowly!

[heater_generic Heater_TT]                # Definition of chamber heater Heater_TT
heater_pin: expander:PA0                  # Pin for controlling the heater
max_power: 0.7                            # Maximum heater power (90% of maximum)
sensor_type: EPCOS 100K B57560G104F       # Temperature sensor type (EPCOS 100K thermistor)
sensor_pin: expander:PA6                  # Pin for temperature sensor (PC5)
pwm_cycle_time: 0.3                       # PWM cycle time for heater control (0.3 seconds)
min_temp: 0                               # Minimum allowable temperature (°C)
max_temp: 120                             # Maximum allowable temperature (°C)
control: pid                              # Heater control method (PID regulation)
pid_Kp: 65.373                            # PID proportional coefficient (Kp)
pid_Ki: 0.214                             # PID integral coefficient (Ki)
pid_Kd: 4993.676                          # PID derivative coefficient (Kd)

[verify_heater Heater_TT]                 # Heater Heater_TT verification
max_error: 240                            # Maximum allowable temperature error (degrees)
check_gain_time: 1800                     # Time to verify temperature gain (seconds)
heating_gain: 1                           # Minimum temperature gain for verification (°C)


#[chamber_fan chamber_fan]
#pin: expander:PA0 
#max_power: 0.7
#shutdown_speed: 0
#kick_start_time: 0.5
#heater: Heater_TT
#fan_speed: 1.0
#off_below: 0
#idle_timeout:30
#idle_speed:0.5

[heater_fan chamber_heater_fan]           # Fan associated with the chamber heater (chamber_heater_fan)
pin: expander:PA1                         # Pin for fan control (PB1)
heater: Heater_TT                         # Heater the fan is associated with (Heater_TT)
heater_temp: 35.0                         # Heater temperature at which the fan turns on (°C)
fan_speed: 1.0                            # Fan speed when on (1.0 = 100%)
shutdown_speed: 0                         # Fan speed when printer is shut down (0 = off)
kick_start_time: 0.5                      # Initial kick duration to start the fan (seconds)

[temperature_sensor Heater_TS]            # Chamber temperature sensor (Heater_TS)
sensor_pin: expander:PA6                  # Pin for temperature sensor (PC5)
sensor_type: Generic 3950                 # Temperature sensor type (Generic 3950 thermistor)
min_temp: 0                               # Minimum allowable temperature (°C)
max_temp: 140                             # Maximum allowable temperature (°C)
[temperature_sensor Heater_TW]            # Chamber temperature sensor (Heater_TW)
sensor_pin: expander:PA5                  # Pin for temperature sensor (PC5)
sensor_type: Generic 3950                 # Temperature sensor type (Generic 3950 thermistor)
min_temp: 0                               # Minimum allowable temperature (°C)
max_temp: 140  
[temperature_fan blower_fan]              # Temperature-controlled chamber cooling fan (blower_fan)
pin: expander:PA3                         # Pin for fan control (PC8)
cycle_time: 0.0100                        # PWM cycle time for fan control (0.01 seconds)
hardware_pwm: false                       # Use hardware PWM (disabled)
max_power: 0.6                             # Maximum fan power (1.0 = 100%)
shutdown_speed: 0                         # Fan speed when printer is shut down (0 = off)
sensor_type: EPCOS 100K B57560G104F       # Temperature sensor type (EPCOS 100K thermistor)
sensor_pin: expander:PA6                  # Pin for temperature sensor (PC5)
min_temp: 0                               # Minimum allowable temperature (°C)
max_temp: 70                              # Maximum allowable temperature (°C)
control: watermark                        # Fan control method (watermark — threshold-based)
max_delta: 0.5                            # Maximum temperature delta for control (°C)
max_speed: 1.0                            # Maximum fan speed (1.0 = 100%)
min_speed: 0.0 

[fan_generic back_fans]
pin: expander:PA3                         # Pin for fan control (PC8)
cycle_time: 0.0100                        # PWM cycle time for fan control (0.01 seconds)
hardware_pwm: false                       # Use hardware PWM (disabled)
max_power: 1                              # Maximum fan power (1.0 = 100%)
shutdown_speed: 0                         # Fan speed when printer is shut down (0 = off)

### Section 3: Chamber Control Variables
# Description: Defines the variables used for chamber temperature and fan control. These variables are used in macros for dynamic control.
#==================== CHAMBER_VARS Setup =================
[gcode_macro CHAMBER_VARS]                # Macro for defining chamber control variables
variable_chamber_target: 0                # Target chamber temperature (°C)
variable_chamber_await_target: 0          # Temperature that must be reached before printing (°C)
variable_delta_temp: 1                    # Difference between chamber and heater temperature (°C)
variable_min_heater_temp: 40              # Minimum heater temperature for cooling (°C)
variable_max_heater_temp: 65              # Maximum heater temperature (°C)
variable_control_interval: 30            # Control function call interval (seconds)
variable_air_min_delta: 0.5               # Minimum temperature difference for control (°C)
variable_air_max_delta: 1.0               # Maximum temperature difference for control (°C)
variable_blower_fan_min_temp: 33          # Minimum temperature below which blower_fan is off (°C)
variable_blower_fan_target_temp: 0        # Target temperature for blower_fan, synced with chamber_target (°C)
variable_last_state: "none"               # Last system state for change tracking
gcode:                                    # Empty G-code (macro is used only for variables)

### Section 4: Temperature Control Macros
# Description: Macros for chamber temperature control (M141, M191), enabling/disabling heating (iHEATER_ON, iHEATER_OFF), and control logic (iHEATER_CONTROL, _iHEATER_CONTROL).
#==================== Temperature Macros =================
[gcode_macro M141]                        # Macro M141: set target chamber temperature
gcode:                                    # Start of macro G-code
    {% set chamber_target = params.S|default(printer["gcode_macro CHAMBER_VARS"].chamber_target)|int %}  # Get parameter S (target temperature) or default value (int)
    {% set delta_temp = params.D|default(printer["gcode_macro CHAMBER_VARS"].delta_temp)|int %}          # Get parameter D (temperature delta) or default value (int)
    {% set max_heater_temp = params.H|default(printer["gcode_macro CHAMBER_VARS"].max_heater_temp)|int %}# Get parameter H (max heater temperature) or default value (int)
    {% set chamber_temp = printer["temperature_sensor Heater_TS"].temperature|float %}                   # Get current chamber temperature (float)
    {% set blower_fan_min_temp = printer["gcode_macro CHAMBER_VARS"].blower_fan_min_temp|float %}       # Get minimum temperature for blower_fan (float)
    {% set control_interval = printer["gcode_macro CHAMBER_VARS"].control_interval|float %}              # Get control interval (float)
    RESPOND prefix="M141" msg="Setting: chamber={chamber_target}°C, delta={delta_temp}°C, max_heater={max_heater_temp}°C, current={chamber_temp}°C"  # Print message with parameters
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=chamber_target VALUE={chamber_target}                 # Set variable chamber_target
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=delta_temp VALUE={delta_temp}                         # Set variable delta_temp
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=max_heater_temp VALUE={max_heater_temp}               # Set variable max_heater_temp
    {% if chamber_target == 0 and chamber_temp > blower_fan_min_temp %}                                  # Check: if target is 0°C and current temperature is above minimum
        SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=blower_fan_target_temp VALUE={blower_fan_min_temp}  # Set blower_fan target temperature to minimum
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={blower_fan_min_temp}                # Set blower_fan temperature (cool to minimum)
    {% else %}                                                                                           # Else (if target is not 0°C or temperature is below minimum)
        SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=blower_fan_target_temp VALUE={chamber_target}     # Set blower_fan target temperature to chamber_target
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={chamber_target}                     # Set blower_fan temperature (maintain chamber_target)
    {% endif %}                                                                                          # End of blower_fan condition
    iHEATER_CONTROL                                                                                      # Call iHEATER_CONTROL macro for heater management
    UPDATE_DELAYED_GCODE ID=_iHEATER_CONTROL DURATION={control_interval}                                 # Schedule periodic call to _iHEATER_CONTROL at given interval

[gcode_macro M191]                        # Macro M191: set temperature and wait for it to be reached
gcode:                                    # Start of macro G-code
    {% set chamber_target = params.S|default(printer["gcode_macro CHAMBER_VARS"].chamber_target)|int %}  # Get parameter S (target temperature) or default value (int)
    {% set delta_temp = params.D|default(printer["gcode_macro CHAMBER_VARS"].delta_temp)|int %}          # Get parameter D (temperature delta) or default value (int)
    {% set max_heater_temp = params.H|default(printer["gcode_macro CHAMBER_VARS"].max_heater_temp)|int %}# Get parameter H (max heater temperature) or default value (int)
    {% set chamber_await_target = params.W|default(chamber_target)|int %}                                # Get parameter W (await temperature) or chamber_target value (int)
    {% set chamber_temp = printer["temperature_sensor Heater_TS"].temperature|float %}                   # Get current chamber temperature (float)
    {% set blower_fan_min_temp = printer["gcode_macro CHAMBER_VARS"].blower_fan_min_temp|float %}       # Get minimum temperature for blower_fan (float)
    RESPOND prefix="M191" msg="Setting: chamber={chamber_target}°C, delta={delta_temp}°C, max_heater={max_heater_temp}°C, await={chamber_await_target}°C, current={chamber_temp}°C"  # Print message with parameters
    M141 S{chamber_target} D{delta_temp} H{max_heater_temp}                                              # Call M141 macro to set parameters
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=chamber_await_target VALUE={chamber_await_target}     # Set variable chamber_await_target
    {% if chamber_target == 0 and chamber_temp > blower_fan_min_temp %}                                  # Check: if target is 0°C and current temperature is above minimum
        SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=blower_fan_target_temp VALUE={blower_fan_min_temp}  # Set blower_fan target temperature to minimum
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={blower_fan_min_temp}                # Set blower_fan temperature (cool to minimum)
        RESPOND prefix="M191" msg="Cooling to {blower_fan_min_temp}°C started"                          # Print message about cooling start
    {% else %}                                                                                           # Else (if target is not 0°C or temperature is below minimum)
        SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=blower_fan_target_temp VALUE={chamber_target}     # Set blower_fan target temperature to chamber_target
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={chamber_target}                     # Set blower_fan temperature (maintain chamber_target)
    {% endif %}                                                                                          # End of blower_fan condition
    {% if chamber_target > 0 %}                                                                          # Check: if target temperature is greater than 0°C
        TEMPERATURE_WAIT SENSOR="temperature_sensor Heater_TS" MINIMUM={chamber_await_target}            # Wait until chamber temperature reaches chamber_await_target
        RESPOND prefix="M191" msg="Chamber reached temperature {chamber_await_target}°C"                 # Print message about temperature reached
    {% endif %}                                                                                          # End of temperature wait condition

[gcode_macro iHEATER_ON]                  # Macro iHEATER_ON: enable heating with alternative parameter names
description: Alternative to M141 & M191 commands with alternative parameter names
gcode:                                    # Start of macro G-code
    {% set s = params.CHAMBER_TEMP|default(printer["gcode_macro CHAMBER_VARS"].chamber_target)|int %}   # Get parameter CHAMBER_TEMP (target temperature) or default value (int)
    {% set d = params.DELTA|default(printer["gcode_macro CHAMBER_VARS"].delta_temp)|int %}               # Get parameter DELTA (temperature delta) or default value (int)
    {% set h = params.HEATER_MAX|default(printer["gcode_macro CHAMBER_VARS"].max_heater_temp)|int %}    # Get parameter HEATER_MAX (max heater temperature) or default value (int)
    {% set w = params.CHAMBER_AWAIT_TEMP|default(printer["gcode_macro CHAMBER_VARS"].chamber_await_target)|int %}  # Get parameter CHAMBER_AWAIT_TEMP (await temperature) or default value (int)
    {% if w > 0 %}                                                                                       # Check: if await temperature is greater than 0°C
        M191 S{s} D{d} H{h} W{w}                                                                         # Call M191 macro with parameters for setting and waiting for temperature
    {% else %}                                                                                           # Else (if await temperature is 0°C)
        M141 S{s} D{d} H{h}                                                                              # Call M141 macro to set temperature without waiting
    {% endif %}                                                                                          # End of macro selection condition

[gcode_macro iHEATER_OFF]                 # Macro iHEATER_OFF: disable heating
gcode:                                    # Start of macro G-code
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=chamber_target VALUE=0                               # Set chamber target temperature to 0°C
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=chamber_await_target VALUE=0                         # Set await temperature to 0°C
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=blower_fan_target_temp VALUE={printer["gcode_macro CHAMBER_VARS"].blower_fan_min_temp}  # Set blower_fan target temperature to minimum
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=last_state VALUE='"none"'                            # Reset last system state to "none"
    SET_HEATER_TEMPERATURE HEATER=Heater_TT TARGET=0                                                    # Set heater target temperature to 0°C (off)
    CLEAR_PAUSE                                                                                         # Clear pause if it was active
    G4 P2000                                                                                            # Pause for 2000 milliseconds (2 seconds) to allow operations to finish
    {% set heater_target = printer["heater_generic Heater_TT"].target|float %}                          # Get current heater target temperature (float)
    {% set heater_power = printer["heater_generic Heater_TT"].power|float %}                            # Get current heater power (float)
    RESPOND prefix="iHeater_off" msg="Heater target temperature={heater_target}°C, power={heater_power}"  # Print heater status message
    UPDATE_DELAYED_GCODE ID=_iHEATER_CONTROL DURATION=1                                                 # Schedule _iHEATER_CONTROL call in 1 second
    RESPOND prefix="iHeater_off" msg="Heating disabled"                                                  # Print heating disabled message

[gcode_macro iHEATER_CONTROL]             # Macro iHEATER_CONTROL: heating and cooling control logic
gcode:                                    # Start of macro G-code
    {% set target_chamber_temp = printer["gcode_macro CHAMBER_VARS"].chamber_target|float %}            # Get target chamber temperature (float)
    {% set delta_temp = printer["gcode_macro CHAMBER_VARS"].delta_temp|float %}                         # Get temperature delta (float)
    {% set min_heater_temp = printer["gcode_macro CHAMBER_VARS"].min_heater_temp|float %}               # Get minimum heater temperature (float)
    {% set max_heater_temp = printer["gcode_macro CHAMBER_VARS"].max_heater_temp|float %}               # Get maximum heater temperature (float)
    {% set heater_temp = printer["heater_generic Heater_TT"].temperature|float %}                       # Get current heater temperature (float)
    {% set chamber_temp = printer["temperature_sensor Heater_TS"].temperature|float %}                  # Get current chamber temperature (float)
    {% set control_interval = printer["gcode_macro CHAMBER_VARS"].control_interval|float %}             # Get control interval (float)
    {% set air_min_delta = printer["gcode_macro CHAMBER_VARS"].air_min_delta|float %}                   # Get minimum temperature difference (float)
    {% set air_max_delta = printer["gcode_macro CHAMBER_VARS"].air_max_delta|float %}                   # Get maximum temperature difference (float)
    {% set blower_fan_min_temp = printer["gcode_macro CHAMBER_VARS"].blower_fan_min_temp|float %}      # Get minimum temperature for blower_fan (float)
    {% set blower_fan_target_temp = printer["gcode_macro CHAMBER_VARS"].blower_fan_target_temp|float %}# Get target temperature for blower_fan (float)
    {% set last_state = printer["gcode_macro CHAMBER_VARS"].last_state %}                               # Get last system state
    {% set current_state = "none" %}                                                                    # Set current system state to "none"
    {% set target_heater_temp = 0.0 %}                                                                  # Initialize target heater temperature (0°C)
    {% if target_chamber_temp > 0 %}                                                                    # Check: if target chamber temperature is greater than 0°C
        {% if chamber_temp >= target_chamber_temp + 1.0 %}                                              # Check: if current chamber temp is >= target + 1°C
            {% set target_heater_temp = 0.0 %}                                                          # Set target heater temperature to 0°C (off)
            {% set current_state = "cooling" %}                                                         # Set system state to "cooling"
            {% if chamber_temp >= blower_fan_min_temp %}                                                # Check: if chamber temperature >= blower_fan minimum
                SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={blower_fan_target_temp}   # Set blower_fan temperature target (cooling)
                {% if last_state != "cooling" %}                                                        # Check: if last state is not "cooling"
                    RESPOND prefix="iHeater_control" msg="Chamber above target, cooling with blower_fan at {blower_fan_target_temp}°C"  # Print cooling start message
                {% endif %}                                                                             # End of message condition
            {% else %}                                                                                  # Else (temperature below minimum)
                SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET=0                          # Turn off blower_fan
                {% set current_state = "fan_off_below_min" %}                                           # Set system state to "fan_off_below_min"
                {% if last_state != "fan_off_below_min" %}                                              # Check: if last state is not "fan_off_below_min"
                    RESPOND prefix="iHeater_control" msg="Chamber below {blower_fan_min_temp}°C, blower_fan off"  # Print fan off message
                {% endif %}                                                                             # End of message condition
            {% endif %}                                                                                 # End of blower_fan condition
        {% elif chamber_temp < target_chamber_temp - 1.0 %}                                             # Check: if chamber temperature is < target - 1°C
            {% set temp_diff = target_chamber_temp - chamber_temp %}                                    # Calculate difference between target and current temperature
            {% set value = temp_diff %}                                                                 # Assign difference to variable value
            {% set inputLowerBound = air_min_delta %}                                                   # Set lower bound of temperature difference
            {% set inputUpperBound = air_max_delta %}                                                   # Set upper bound of temperature difference
            {% set outputLowerBound = delta_temp %}                                                     # Set lower bound of temperature correction
            {% set outputUpperBound = [delta_temp, max_heater_temp - target_chamber_temp]|max %}        # Set upper bound of correction (max of delta_temp and allowable overshoot)
            {% set slope = (outputUpperBound - outputLowerBound) / (inputUpperBound - inputLowerBound) %}  # Calculate slope for linear interpolation
            {% set clamped = ([inputLowerBound, value, inputUpperBound]|sort)[1] %}                     # Clamp value between lower and upper bounds
            {% set adjustment = outputLowerBound + slope * (clamped - inputLowerBound) %}               # Calculate heater temperature correction
            {% set target_heater_temp = ([target_chamber_temp + adjustment, target_chamber_temp + delta_temp]|min)|round(2) %}  # Set target heater temperature (min of two values, rounded to 2 decimal places)
            SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET=0                              # Turn off blower_fan
            {% set current_state = "heating" %}                                                         # Set system state to "heating"
            {% if last_state != "heating" %}                                                            # Check: if last state is not "heating"
                RESPOND prefix="iHeater_control" msg="Heating to target, blower_fan off"              # Print heating start message
            {% endif %}                                                                             # End of message condition
        {% else %}                                                                                      # Else (chamber temperature is near target)
            {% set target_heater_temp = target_chamber_temp + delta_temp %}                             # Set target heater temperature (target + delta)
            {% set current_state = "maintaining" %}                                                     # Set system state to "maintaining"
            {% if chamber_temp >= blower_fan_min_temp %}                                                # Check: if chamber temperature >= blower_fan minimum
                SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={blower_fan_target_temp}   # Set blower_fan temperature (maintaining)
                {% if last_state != "maintaining" %}                                                    # Check: if last state is not "maintaining"
                    RESPOND prefix="iHeater_control" msg="Chamber near target, maintaining with blower_fan at {blower_fan_target_temp}°C"  # Print maintaining message
                {% endif %}                                                                             # End of message condition
            {% else %}                                                                                  # Else (temperature below minimum)
                SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET=0                          # Turn off blower_fan
                {% set current_state = "fan_off_below_min" %}                                           # Set system state to "fan_off_below_min"
                {% if last_state != "fan_off_below_min" %}                                              # Check: if last state is not "fan_off_below_min"
                    RESPOND prefix="iHeater_control" msg="Chamber below {blower_fan_min_temp}°C, blower_fan off"  # Print fan off message
                {% endif %}                                                                             # End of message condition
            {% endif %}                                                                                 # End of blower_fan condition
        {% endif %}                                                                                     # End of temperature check condition
    {% else %}                                                                                          # Else (target chamber temperature is 0°C)
        {% if chamber_temp > blower_fan_min_temp %}                                                     # Check: if chamber temperature is above blower_fan minimum
            SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET={blower_fan_target_temp}       # Set blower_fan temperature (cooling)
            {% set current_state = "cooling_after_shutdown" %}                                          # Set system state to "cooling_after_shutdown"
            {% if last_state != "cooling_after_shutdown" %}                                             # Check: if last state is not "cooling_after_shutdown"
                RESPOND prefix="iHeater_control" msg="Cooling chamber after shutdown"               # Print post-shutdown cooling message
            {% endif %}                                                                             # End of message condition
        {% else %}                                                                                      # Else (chamber temperature is below minimum)
            SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=blower_fan TARGET=0                              # Turn off blower_fan
            {% set current_state = "cooled" %}                                                          # Set system state to "cooled"
            {% if last_state != "cooled" %}                                                             # Check: if last state is not "cooled"
                RESPOND prefix="iHeater_control" msg="Chamber cooled to {blower_fan_min_temp}°C"      # Print cooling complete message
            {% endif %}                                                                             # End of message condition
            {% set control_interval = 0.0 %}                                                            # Set control interval to 0 (stop periodic calls)
        {% endif %}                                                                                     # End of blower_fan condition
    {% endif %}                                                                                         # End of target temperature condition
    SET_GCODE_VARIABLE MACRO=CHAMBER_VARS VARIABLE=last_state VALUE='"{current_state}"'                # Set variable last_state (current state)
    SET_HEATER_TEMPERATURE HEATER=Heater_TT TARGET={target_heater_temp}                                # Set target heater temperature
    UPDATE_DELAYED_GCODE ID=_iHEATER_CONTROL DURATION={control_interval}                               # Schedule periodic call to _iHEATER_CONTROL at given interval

[delayed_gcode _iHEATER_CONTROL]          # Periodic call to iHEATER_CONTROL macro
gcode:                                    # Start of G-code
    iHEATER_CONTROL                       # Call iHEATER_CONTROL macro for heater management